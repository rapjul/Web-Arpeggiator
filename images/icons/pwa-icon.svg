<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Web Arpeggiator">
  <!--
    Web Arpeggiator Standard Icon (Concept 2: Step Sequencer Matrix)

    Grid Setup:
    - Columns (x spacing = 80px): Col 1 = 96, Col 2 = 176, Col 3 = 256, Col 4 = 336, Col 5 = 416
    - Rows (y spacing = 90px): Row 1 = 126, Row 2 = 216, Row 3 = 306, Row 4 = 396

    Active Path:
    - Step 1: (96, 396) [Col 1, Row 4]
    - Step 2: (176, 306) [Col 2, Row 3]
    - Step 3: (256, 216) [Col 3, Row 2]
    - Step 4: (336, 126) [Col 4, Row 1]
    - Step 5: (416, 306) [Col 5, Row 3]
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="edge-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur-wide" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur-wide" />
      <feMerge>
        <feMergeNode in="blur-wide" />
        <feMergeNode in="blur-tight" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Grid lines (subtle background matrix) -->
  <!-- Horizontal lines -->
  <line x1="96" y1="126" x2="416" y2="126" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="96" y1="216" x2="416" y2="216" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="96" y1="306" x2="416" y2="306" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="96" y1="396" x2="416" y2="396" stroke="#334155" stroke-width="2" opacity="0.2" />

  <!-- Vertical lines -->
  <line x1="96" y1="126" x2="96" y2="396" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="176" y1="126" x2="176" y2="396" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="256" y1="126" x2="256" y2="396" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="336" y1="126" x2="336" y2="396" stroke="#334155" stroke-width="2" opacity="0.2" />
  <line x1="416" y1="126" x2="416" y2="396" stroke="#334155" stroke-width="2" opacity="0.2" />

  <!-- Inactive Step Nodes -->
  <!-- Row 1 -->
  <circle cx="96" cy="126" r="6" fill="#475569" opacity="0.4" />
  <circle cx="176" cy="126" r="6" fill="#475569" opacity="0.4" />
  <circle cx="256" cy="126" r="6" fill="#475569" opacity="0.4" />
  <!-- (336, 126 is active) -->
  <circle cx="416" cy="126" r="6" fill="#475569" opacity="0.4" />

  <!-- Row 2 -->
  <circle cx="96" cy="216" r="6" fill="#475569" opacity="0.4" />
  <circle cx="176" cy="216" r="6" fill="#475569" opacity="0.4" />
  <!-- (256, 216 is active) -->
  <circle cx="336" cy="216" r="6" fill="#475569" opacity="0.4" />
  <circle cx="416" cy="216" r="6" fill="#475569" opacity="0.4" />

  <!-- Row 3 -->
  <circle cx="96" cy="306" r="6" fill="#475569" opacity="0.4" />
  <!-- (176, 306 is active) -->
  <circle cx="256" cy="306" r="6" fill="#475569" opacity="0.4" />
  <circle cx="336" cy="306" r="6" fill="#475569" opacity="0.4" />
  <!-- (416, 306 is active) -->

  <!-- Row 4 -->
  <!-- (96, 396 is active) -->
  <circle cx="176" cy="396" r="6" fill="#475569" opacity="0.4" />
  <circle cx="256" cy="396" r="6" fill="#475569" opacity="0.4" />
  <circle cx="336" cy="396" r="6" fill="#475569" opacity="0.4" />
  <circle cx="416" cy="396" r="6" fill="#475569" opacity="0.4" />

  <!-- Sequence Path (glowing trace) -->
  <path d="M 96,396 L 176,306 L 256,216 L 336,126 L 416,306"
        fill="none" stroke="url(#edge-glow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#node-glow)" opacity="0.8" />
  <path d="M 96,396 L 176,306 L 256,216 L 336,126 L 416,306"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Active Step Nodes (larger glowing nodes) -->
  <circle cx="96" cy="396" r="14" fill="#a78bfa" filter="url(#node-glow)" />
  <circle cx="96" cy="396" r="7" fill="#ffffff" />

  <circle cx="176" cy="306" r="14" fill="#818cf8" filter="url(#node-glow)" />
  <circle cx="176" cy="306" r="7" fill="#ffffff" />

  <circle cx="256" cy="216" r="14" fill="#60a5fa" filter="url(#node-glow)" />
  <circle cx="256" cy="216" r="7" fill="#ffffff" />

  <circle cx="336" cy="126" r="14" fill="#38bdf8" filter="url(#node-glow)" />
  <circle cx="336" cy="126" r="7" fill="#ffffff" />

  <circle cx="416" cy="306" r="14" fill="#2dd4bf" filter="url(#node-glow)" />
  <circle cx="416" cy="306" r="7" fill="#ffffff" />
</svg>